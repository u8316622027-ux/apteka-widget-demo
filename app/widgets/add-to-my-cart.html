<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add To Cart Mock Widget</title>
    <link rel="stylesheet" href="./styles/tailwind.css" />
    <link rel="stylesheet" href="./styles/widget-shell.css" />
      <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body x-data="{ tool: document.title }">
    <main class="widget-shell" data-widget-shell="add_to_my_cart">
      <header class="widget-header">
        <span class="widget-label">add_to_my_cart</span>
        <h1 class="widget-title">Add To Cart Layout</h1>
        <p class="widget-subtitle">Static mockup. Action buttons are not interactive yet.</p>
      </header>
      <section class="widget-grid">
        <article class="widget-card">
          <h2>Product Selection Block</h2>
          <p>Card area for selected product and quantity preview.</p>
        </article>
        <article class="widget-card">
          <h2>Cart Update Summary</h2>
          <p>Future response status and delta of cart items.</p>
        </article>
      </section>
    </main>
    <script src="./scripts/widget-shell.js"></script>
  </body>
</html>
