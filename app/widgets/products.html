<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Products Mock</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: transparent;
      }

      body {
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        color: #f4f7ff;
        overflow-x: hidden;
        overflow-y: hidden;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 10px;
      }

      .widget-shell.search-mock {
        width: min(100%, 920px);
        border-radius: 0;
        background: transparent;
        border: none;
        padding: 14px 10px 18px;
        overflow: hidden;
        position: relative;
      }

      .products-content {
        transition: filter 0.2s ease;
        display: flex;
        flex-direction: column;
      }

      .widget-shell.search-mock.is-loading .products-content {
        filter: blur(3px);
        pointer-events: none;
      }

      .products-loading-overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(9, 15, 30, 0.28);
        backdrop-filter: blur(2px);
        z-index: 10;
        color: #d4e5ff;
        font-size: 13px;
        letter-spacing: 0.04em;
      }

      .widget-shell.search-mock.is-loading .products-loading-overlay {
        display: flex;
      }

      .search-toolbar {
        display: grid;
        grid-template-columns: 160px 1fr 58px;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .search-logo-link {
        display: flex;
        align-items: center;
        line-height: 0;
      }

      .search-logo-image {
        width: 160px;
        height: 42px;
        object-fit: contain;
      }

      .search-input-wrap {
        position: relative;
      }

      .search-input-wrap input {
        width: 100%;
        height: 44px;
        border-radius: 999px;
        border: 1px solid #1f4da1;
        background: #07173d;
        color: #c6d9ff;
        padding: 0 56px 0 16px;
        outline: none;
      }

      .search-input-wrap input::placeholder {
        color: #7b8dac;
      }

      .search-icon {
        position: absolute;
        right: 7px;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: none;
        background: #1265ec;
        display: grid;
        place-items: center;
        color: #fff;
        cursor: pointer;
      }

      .cart-icon {
        position: relative;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 1px solid #2b4e89;
        background: #0a1632;
        color: #eef3ff;
        font-size: 22px;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .cart-badge {
        position: absolute;
        right: -4px;
        top: -6px;
        min-width: 18px;
        height: 18px;
        border-radius: 999px;
        background: #ef232f;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        display: grid;
        place-items: center;
        padding: 0 5px;
      }

      .carousel-frame {
        position: relative;
        min-height: 430px;
        margin-top: 22px;
      }

      .product-carousel {
        width: calc(100% + 190px);
        max-width: calc(100% + 190px);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .carousel-viewport {
        overflow: hidden;
        padding: 2px;
      }

      .product-track {
        display: flex;
        gap: 14px;
        overflow-x: auto;
        scroll-behavior: smooth;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .product-track::-webkit-scrollbar {
        display: none;
      }

      .product-card {
        flex: 0 0 240px;
        border-radius: 14px;
        border: 1px solid #dbe6ff;
        background: #ffffff;
        padding: 10px;
        min-height: 396px;
        display: grid;
        grid-template-rows: 210px 66px 24px 22px 40px 38px;
        gap: 8px;
        align-content: start;
      }

      .product-image {
        width: 100%;
        height: 210px;
        object-fit: contain;
        object-position: center;
        border-radius: 10px;
        background: #f3f5f9;
        padding: 6px;
        box-sizing: border-box;
      }

      .products-loading-spinner {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 2px solid rgba(130, 173, 255, 0.25);
        border-top-color: #7fb8ff;
        animation: products-spin 0.85s linear infinite;
      }

      @keyframes products-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .skeleton-card {
        flex: 0 0 240px;
        border-radius: 18px;
        border: 1px solid #22488e;
        background: #06112a;
        padding: 11px;
        min-height: 358px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .skeleton-block {
        border-radius: 10px;
        background: linear-gradient(90deg, rgba(90, 112, 148, 0.24), rgba(130, 156, 196, 0.35), rgba(90, 112, 148, 0.24));
        background-size: 220% 100%;
        animation: products-skeleton-wave 1.2s ease-in-out infinite;
      }

      .skeleton-image {
        height: 210px;
      }

      .skeleton-title {
        height: 22px;
      }

      .skeleton-meta {
        height: 14px;
        width: 72%;
      }

      .skeleton-price {
        height: 32px;
        width: 58%;
      }

      .skeleton-button {
        margin-top: auto;
        height: 38px;
      }

      @keyframes products-skeleton-wave {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -20% 0;
        }
      }

      .product-title {
        margin: 0;
        font-size: 14px;
        line-height: 1.25;
        min-height: 66px;
        max-height: 66px;
        overflow: hidden;
        color: #14316f;
        font-weight: 700;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        line-clamp: 3;
      }

      .manufacturer {
        margin: 0;
        color: #4d5f8d;
        font-size: 11px;
        min-height: 24px;
        max-height: 24px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .product-manufacturer-row {
        min-height: 24px;
      }

      .product-price-row {
        min-height: 22px;
        display: flex;
        align-items: center;
      }

      .old-price {
        margin: 0;
        color: #f95757;
        text-decoration: line-through;
        font-size: 10px;
        line-height: 1.2;
      }

      .discount {
        margin-left: 6px;
        text-decoration: none;
        display: inline-block;
        background: #ef232f;
        color: #fff;
        border-radius: 5px;
        padding: 0 6px;
        font-weight: 700;
      }

      .new-price {
        margin: 0;
        font-size: 36px;
        color: #1f55d6;
        font-weight: 800;
        line-height: 1;
        min-height: 40px;
      }

      .new-price.is-unavailable {
        color: #cad8f5;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
        display: flex;
        align-items: center;
      }

      .add-to-cart-button {
        width: 100%;
        border: none;
        border-radius: 8px;
        height: 38px;
        background: #1f55d6;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .add-to-cart-button--ghost {
        border: 1px solid #1f55d6;
        background: #ffffff;
        color: #1f55d6;
      }

      .add-to-cart-button:disabled {
        cursor: default;
      }

      .product-card.is-unavailable {
        border-color: #355b9c;
      }

      .carousel-arrow {
        position: static;
        width: 34px;
        height: 86px;
        border-radius: 18px;
        border: 1px solid rgba(59, 103, 188, 0.58);
        background: linear-gradient(180deg, rgba(10, 22, 50, 0.76), rgba(14, 32, 70, 0.66));
        color: #cfe0ff;
        display: grid;
        place-items: center;
        z-index: 2;
        cursor: pointer;
        backdrop-filter: blur(3px);
        box-shadow: 0 8px 18px rgba(0, 8, 30, 0.3);
      }

      .carousel-arrow-wrap {
        position: absolute;
        top: 50%;
        width: 0;
        display: flex;
        align-items: center;
        pointer-events: none;
        z-index: 3;
        transform: translateY(-50%);
        background: transparent;
      }

      .carousel-arrow-wrap.left {
        left: 6px;
        justify-content: flex-start;
      }

      .carousel-arrow-wrap.right {
        right: 6px;
        justify-content: flex-end;
      }

      .carousel-arrow-wrap .carousel-arrow {
        pointer-events: auto;
      }

      .carousel-arrow:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .carousel-arrow.left {
        margin-left: 0;
      }

      .carousel-arrow.right {
        margin-right: 0;
      }

      .carousel-bottom {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 36px 0 2px;
        padding-bottom: 10px;
      }

      .center-indicator {
        width: 46px;
        height: 46px;
        border-radius: 999px;
        border: 1px solid #2b4e89;
        background: #0a1632;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 18px;
      }

      .products-icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .products-icon--search,
      .products-icon--cart {
        width: 20px;
        height: 20px;
      }

      .products-icon--cart {
        width: 24px;
        height: 24px;
        stroke-width: 2.2;
      }

      .products-icon--chevron {
        width: 26px;
        height: 26px;
      }

      .products-icon--truck,
      .products-icon--headset {
        width: 22px;
        height: 22px;
      }

      .cart-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(8, 14, 28, 0.5);
        backdrop-filter: blur(2px);
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .cart-modal-overlay[hidden] {
        display: none;
      }

      .cart-modal {
        width: min(100%, 640px);
        border-radius: 14px;
        border: 1px solid #dce6ff;
        background: #fff;
        color: #15306d;
        box-shadow: 0 18px 40px rgba(6, 15, 36, 0.42);
      }

      .cart-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid #e6ebf8;
      }

      .cart-modal-title {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .cart-modal-close {
        border: none;
        background: transparent;
        color: #516389;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
      }

      .cart-modal-items {
        max-height: min(52vh, 340px);
        overflow: auto;
        padding: 8px 12px;
      }

      .cart-modal-item {
        display: grid;
        grid-template-columns: 78px 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 4px;
        border-bottom: 1px solid #edf1fa;
      }

      .cart-modal-item-image {
        width: 78px;
        height: 78px;
        object-fit: contain;
        border-radius: 10px;
        background: #f3f5f9;
        padding: 4px;
        box-sizing: border-box;
      }

      .cart-modal-item-name {
        margin: 0 0 4px;
        font-size: 14px;
        line-height: 1.3;
        color: #14316f;
        font-weight: 700;
      }

      .cart-modal-item-meta {
        margin: 0 0 4px;
        font-size: 12px;
        color: #4d5f8d;
      }

      .cart-modal-item-price {
        margin: 0;
        font-size: 14px;
        color: #1f55d6;
        font-weight: 700;
      }

      .cart-modal-qty {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .cart-modal-qty-button {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid #c5d2ee;
        background: #fff;
        color: #14316f;
        cursor: pointer;
      }

      .cart-modal-qty-value {
        min-width: 18px;
        text-align: center;
        font-weight: 700;
        color: #14316f;
      }

      .cart-modal-empty {
        margin: 6px 0 8px;
        color: #5f739e;
        font-size: 14px;
      }

      .cart-modal-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 16px;
        border-top: 1px solid #e6ebf8;
      }

      .cart-modal-total {
        margin: 0;
        font-size: 22px;
        color: #14316f;
        font-weight: 800;
      }

      .cart-modal-actions {
        display: flex;
        gap: 8px;
      }

      .cart-modal-action {
        height: 36px;
        border-radius: 8px;
        border: 1px solid #d1dbf2;
        background: #fff;
        color: #1f55d6;
        font-weight: 700;
        font-size: 13px;
        padding: 0 12px;
        cursor: pointer;
      }

      .cart-modal-action--primary {
        background: #ef232f;
        border-color: #ef232f;
        color: #fff;
      }

      @media (max-width: 930px) {
        .search-toolbar {
          grid-template-columns: 142px 1fr 48px;
        }

        .search-logo-image {
          width: 142px;
          height: 36px;
        }

        .product-carousel {
          width: 100%;
          max-width: 100%;
          display: block;
        }

        .product-card {
          flex-basis: 230px;
        }

        .product-title {
          font-size: 13px;
          min-height: 58px;
          max-height: 58px;
        }

        .manufacturer,
        .old-price {
          font-size: 11px;
        }

        .new-price {
          font-size: 30px;
        }
      }

      @media (max-width: 620px) {
        .search-toolbar {
          grid-template-columns: 120px 1fr 48px;
          gap: 8px;
          margin-bottom: 20px;
        }

        .search-logo-image {
          width: 120px;
          height: 30px;
        }

        .cart-icon {
          justify-self: stretch;
          width: 48px;
          height: 48px;
        }

        .product-card {
          flex: 0 0 58vw;
          max-width: 220px;
          min-height: 280px;
          grid-template-rows: 124px 44px 17px 16px 28px 32px;
        }

        .product-image {
          height: 124px;
        }

        .carousel-frame {
          margin-top: 26px;
        }

        .carousel-arrow {
          width: 30px;
          height: 74px;
        }

        .carousel-arrow.left {
          margin-left: -2px;
        }

        .carousel-arrow.right {
          margin-right: -2px;
        }

        .product-title {
          min-height: auto;
          max-height: none;
          font-size: 11px;
        }

        .manufacturer,
        .old-price {
          font-size: 9px;
        }

        .new-price {
          font-size: 20px;
        }

        .add-to-cart-button {
          font-size: 12px;
        }

        .carousel-bottom {
          margin-top: 34px;
          margin-bottom: 0;
          padding-bottom: 16px;
        }

        .cart-modal {
          width: min(100%, 420px);
        }

        .cart-modal-item {
          grid-template-columns: 64px 1fr;
          row-gap: 8px;
        }

        .cart-modal-item-image {
          width: 64px;
          height: 64px;
        }

        .cart-modal-qty {
          grid-column: 1 / -1;
          justify-content: flex-end;
        }

        .cart-modal-footer {
          flex-direction: column;
          align-items: stretch;
        }

        .cart-modal-actions {
          width: 100%;
        }

        .cart-modal-action {
          flex: 1;
        }
      }
    </style>
  </head>
  <body x-data="{ tool: 'search_products' }">
    <main class="widget-shell search-mock" data-widget-shell="search_products">
      <div class="products-loading-overlay" id="products-loading-overlay">
        <div class="products-loading-spinner" aria-label="Загрузка"></div>
      </div>
      <div class="products-content">
        <section class="search-toolbar">
          <a class="search-logo-link" href="https://www.apteka.md/" target="_blank" rel="noopener noreferrer">
            <img
              class="search-logo-image"
              src="https://www.apteka.md/_next/static/media/BigLogo.50692667.svg"
              alt="Apteka"
            />
          </a>
          <label class="search-input-wrap">
            <input id="products-search-input" type="text" placeholder="Искать по всем категориям" />
            <button id="products-search-button" class="search-icon" aria-label="Поиск">
              <svg class="products-icon products-icon--search" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
              </svg>
            </button>
          </label>
          <button class="cart-icon" aria-label="Корзина" id="products-cart-button">
            <svg class="products-icon products-icon--cart" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="9" cy="20" r="1.5"></circle>
              <circle cx="18" cy="20" r="1.5"></circle>
              <path d="M2 3h2l2.4 11.2a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 2-1.5L21 7H7"></path>
            </svg>
            <span class="cart-badge" id="products-cart-badge" hidden>0</span>
          </button>
        </section>

        <div class="carousel-frame">
          <div class="carousel-arrow-wrap left">
            <button class="carousel-arrow left" id="products-arrow-left" aria-label="Предыдущий">
              <svg class="products-icon products-icon--chevron" viewBox="0 0 24 24" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
          </div>
          <div class="product-carousel">
            <div class="carousel-viewport">
              <section class="product-track" id="product-track" aria-live="polite"></section>
            </div>
          </div>
          <div class="carousel-arrow-wrap right">
            <button class="carousel-arrow right" id="products-arrow-right" aria-label="Следующий">
              <svg class="products-icon products-icon--chevron" viewBox="0 0 24 24" aria-hidden="true">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
        </div>

        <div class="carousel-bottom">
          <div class="center-indicator" aria-label="Доставка">
            <svg class="products-icon products-icon--truck" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="1.5" y="6.5" width="12" height="9" rx="1.5"></rect>
              <path d="M13.5 9h4l3 3v3.5h-7"></path>
              <circle cx="6" cy="17.5" r="1.6"></circle>
              <circle cx="18" cy="17.5" r="1.6"></circle>
            </svg>
          </div>
          <div class="center-indicator" aria-label="Поддержка">
            <svg class="products-icon products-icon--headset" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 13a8 8 0 0 1 16 0"></path>
              <rect x="3.5" y="12" width="4" height="6" rx="1.5"></rect>
              <rect x="16.5" y="12" width="4" height="6" rx="1.5"></rect>
              <path d="M20.5 18.5a3.5 3.5 0 0 1-3.5 3.5H13"></path>
            </svg>
          </div>
        </div>

        <div class="cart-modal-overlay" id="products-cart-modal" hidden>
          <section class="cart-modal" role="dialog" aria-modal="true" aria-labelledby="products-cart-title">
            <header class="cart-modal-header">
              <h2 class="cart-modal-title" id="products-cart-title">Корзина</h2>
              <button class="cart-modal-close" id="products-cart-close" aria-label="Закрыть">×</button>
            </header>
            <div class="cart-modal-items" id="products-cart-items"></div>
            <footer class="cart-modal-footer">
              <p class="cart-modal-total" id="products-cart-total">Итого: 0.00 MDL</p>
              <div class="cart-modal-actions">
                <button class="cart-modal-action" type="button">Перейти в корзину</button>
                <button class="cart-modal-action cart-modal-action--primary" type="button">Оформить заказ</button>
              </div>
            </footer>
          </section>
        </div>
      </div>
    </main>
    <script>
      (function () {
        const root = document.querySelector("[data-widget-shell]");
        if (!root) {
          return;
        }

        const SEARCH_ENDPOINT = "https://stage.apteka.md/api/v1/front/search";
        const SEARCH_ORIGIN = new URL(SEARCH_ENDPOINT).origin;
        const SEARCH_TIMEOUT_MS = 7000;
        const MAX_SEARCH_ATTEMPTS = 3;
        const INITIAL_PAYLOAD_WAIT_MS = 5000;
        const INITIAL_PAYLOAD_POLL_MS = 140;
        const CART_ENDPOINT = "https://stage.apteka.md/api/v1/front/cart";
        const CART_ADD_ENDPOINT = "https://stage.apteka.md/api/v1/front/cart/add";
        const LOCAL_CART_KEY = "apteka_widget_cart";
        const CART_ITEMS_KEY = "apteka_widget_cart_items";
        const CART_SESSION_KEY = "apteka_cart_session_id";
        const CART_TOKEN_KEY = "apteka_cart_token";
        const FALLBACK_IMAGE = "https://api.apteka.md/assets/images/placeholder-600x600.png";

        const state = {
          loadedOnce: false,
          isSearching: false,
          isLoading: true,
          products: [],
          lastQuery: "",
        };
        let cartSyncQueue = Promise.resolve();

        const input = document.getElementById("products-search-input");
        const searchButton = document.getElementById("products-search-button");
        const track = document.getElementById("product-track");
        const leftArrow = document.getElementById("products-arrow-left");
        const rightArrow = document.getElementById("products-arrow-right");
        const cartBadge = document.getElementById("products-cart-badge");
        const loadingOverlay = document.getElementById("products-loading-overlay");
        const cartButton = document.getElementById("products-cart-button");
        const cartModal = document.getElementById("products-cart-modal");
        const cartModalClose = document.getElementById("products-cart-close");
        const cartModalItems = document.getElementById("products-cart-items");
        const cartModalTotal = document.getElementById("products-cart-total");

        const normalizeText = (value) => String(value || "").trim();
        const toMoney = (value) => {
          if (typeof value !== "number" || Number.isNaN(value)) {
            return "";
          }
          return `${value.toFixed(2)} MDL`;
        };

        const computeDiscount = (price, discountPrice) => {
          if (
            typeof price !== "number" ||
            typeof discountPrice !== "number" ||
            Number.isNaN(price) ||
            Number.isNaN(discountPrice) ||
            price <= 0 ||
            discountPrice >= price
          ) {
            return null;
          }
          return Math.max(1, Math.round(((price - discountPrice) / price) * 100));
        };

        const resolveImageUrl = (rawUrl) => {
          const imageUrl = normalizeText(rawUrl);
          if (!imageUrl) {
            return "";
          }
          if (imageUrl.startsWith("data:")) {
            return imageUrl;
          }
          if (/^https?:\/\//i.test(imageUrl)) {
            return imageUrl;
          }
          return new URL(imageUrl, SEARCH_ORIGIN).href;
        };

        const setLoading = (nextValue) => {
          state.isLoading = Boolean(nextValue);
          if (state.isLoading) {
            root.classList.add("is-loading");
            return;
          }
          root.classList.remove("is-loading");
          if (loadingOverlay) {
            loadingOverlay.setAttribute("aria-hidden", "true");
          }
        };

        const extractItems = (payload) => {
          if (Array.isArray(payload?.items)) {
            return payload.items.filter((item) => item && typeof item === "object");
          }
          if (Array.isArray(payload?.results)) {
            return payload.results.filter((item) => item && typeof item === "object");
          }
          if (Array.isArray(payload?.products)) {
            return payload.products.filter((item) => item && typeof item === "object");
          }
          if (Array.isArray(payload?.data?.items)) {
            return payload.data.items.filter((item) => item && typeof item === "object");
          }
          if (Array.isArray(payload?.data?.results)) {
            return payload.data.results.filter((item) => item && typeof item === "object");
          }
          if (Array.isArray(payload?.data?.products)) {
            return payload.data.products.filter((item) => item && typeof item === "object");
          }
          if (Array.isArray(payload)) {
            return payload.filter((item) => item && typeof item === "object");
          }
          return [];
        };

        const mapProduct = (item) => {
          const translations = typeof item.translations === "object" && item.translations ? item.translations : {};
          const ro = typeof translations.ro === "object" && translations.ro ? translations.ro : {};
          const ru = typeof translations.ru === "object" && translations.ru ? translations.ru : {};
          const name =
            normalizeText(item.name_ru) ||
            normalizeText(item.name_ro) ||
            normalizeText(ro.name) ||
            normalizeText(ru.name) ||
            normalizeText(item.name) ||
            "Товар";
          const manufacturer = normalizeText(item.manufacturer) || "Производитель не указан";

          const priceRaw = item.price;
          const discountRaw = item.discountPrice ?? item.discount_price;
          const price = Number(priceRaw);
          const discountPrice = Number(discountRaw);

          let imageUrl =
            resolveImageUrl(item.image) ||
            resolveImageUrl(item.image_url) ||
            resolveImageUrl(item.imageUrl) ||
            resolveImageUrl(item.picture) ||
            resolveImageUrl(item.photo) ||
            resolveImageUrl(item.thumbnail);

          const extractFromObjects = (value) => {
            if (Array.isArray(value)) {
              for (const row of value) {
                if (typeof row === "string") {
                  const fromString = resolveImageUrl(row);
                  if (fromString) {
                    return fromString;
                  }
                  continue;
                }
                if (!row || typeof row !== "object") {
                  continue;
                }
                const fromObject =
                  resolveImageUrl(row.full) ||
                  resolveImageUrl(row.preview) ||
                  resolveImageUrl(row.url) ||
                  resolveImageUrl(row.image) ||
                  resolveImageUrl(row.src) ||
                  resolveImageUrl(row.path);
                if (fromObject) {
                  return fromObject;
                }
              }
            }
            if (value && typeof value === "object") {
              return (
                resolveImageUrl(value.full) ||
                resolveImageUrl(value.preview) ||
                resolveImageUrl(value.url) ||
                resolveImageUrl(value.image) ||
                resolveImageUrl(value.src) ||
                resolveImageUrl(value.path)
              );
            }
            return "";
          };

          if (!imageUrl && typeof item.meta === "object" && item.meta) {
            imageUrl =
              resolveImageUrl(item.meta.image) ||
              resolveImageUrl(item.meta.image_url) ||
              resolveImageUrl(item.meta.thumbnail) ||
              extractFromObjects(item.meta.images);
          }
          if (!imageUrl) {
            imageUrl =
              extractFromObjects(item.images) ||
              extractFromObjects(item.gallery) ||
              extractFromObjects(item.photos) ||
              extractFromObjects(item.media);
          }
          if (!imageUrl) {
            imageUrl = FALLBACK_IMAGE;
          }

          return {
            id:
              normalizeText(item.id) ||
              normalizeText(item.product_id) ||
              normalizeText(item.productId) ||
              normalizeText(item.item_id) ||
              normalizeText(item.sku),
            name,
            manufacturer,
            price: Number.isNaN(price) ? null : price,
            discountPrice: Number.isNaN(discountPrice) ? null : discountPrice,
            imageUrl,
          };
        };

        const getOrCreateCartSessionId = () => {
          const stored = normalizeText(localStorage.getItem(CART_SESSION_KEY));
          if (stored) {
            return stored;
          }
          const next =
            typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
              ? crypto.randomUUID()
              : `session-${Date.now()}`;
          localStorage.setItem(CART_SESSION_KEY, next);
          return next;
        };

        const readCartToken = () => {
          const accessToken = normalizeText(localStorage.getItem(CART_TOKEN_KEY));
          if (!accessToken) {
            return null;
          }
          return { tokenType: "Bearer", accessToken };
        };

        const writeCartToken = (token) => {
          if (!token || !token.accessToken) {
            return;
          }
          localStorage.setItem(CART_TOKEN_KEY, token.accessToken);
        };

        const ensureCartToken = async () => {
          const existing = readCartToken();
          if (existing) {
            return existing;
          }
          const response = await fetch(CART_ENDPOINT, { method: "GET" });
          const payload = await response.json();
          const accessToken = normalizeText(payload?.accessToken);
          if (!accessToken) {
            throw new Error("cart token is missing");
          }
          const token = { tokenType: normalizeText(payload?.tokenType) || "Bearer", accessToken };
          writeCartToken(token);
          return token;
        };

        const syncCartAddToBackend = async (productId) => {
          if (!productId) {
            return;
          }
          getOrCreateCartSessionId();
          const token = await ensureCartToken();
          await fetch(CART_ADD_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `${token.tokenType} ${token.accessToken}`,
            },
            body: JSON.stringify({ product_id: productId, quantity: 1, json: true }),
            keepalive: true,
          });
        };

        const readLocalCartCount = () => {
          try {
            const payload = JSON.parse(localStorage.getItem(LOCAL_CART_KEY) || "{}");
            if (!payload || typeof payload !== "object") {
              return 0;
            }
            return Object.values(payload).reduce((sum, qty) => {
              const parsed = Number(qty);
              return sum + (Number.isFinite(parsed) && parsed > 0 ? parsed : 0);
            }, 0);
          } catch (_error) {
            return 0;
          }
        };

        const writeLocalCartAdd = (productId) => {
          if (!productId) {
            return;
          }
          try {
            const payload = JSON.parse(localStorage.getItem(LOCAL_CART_KEY) || "{}");
            const next = payload && typeof payload === "object" ? payload : {};
            const prev = Number(next[productId]);
            next[productId] = Number.isFinite(prev) && prev > 0 ? prev + 1 : 1;
            localStorage.setItem(LOCAL_CART_KEY, JSON.stringify(next));
          } catch (_error) {
            return;
          }
        };

        const readLocalCart = () => {
          try {
            const payload = JSON.parse(localStorage.getItem(LOCAL_CART_KEY) || "{}");
            return payload && typeof payload === "object" ? payload : {};
          } catch (_error) {
            return {};
          }
        };

        const writeLocalCart = (next) => {
          localStorage.setItem(LOCAL_CART_KEY, JSON.stringify(next));
        };

        const readCartItems = () => {
          try {
            const payload = JSON.parse(localStorage.getItem(CART_ITEMS_KEY) || "{}");
            return payload && typeof payload === "object" ? payload : {};
          } catch (_error) {
            return {};
          }
        };

        const writeCartItems = (next) => {
          localStorage.setItem(CART_ITEMS_KEY, JSON.stringify(next));
        };

        const ensureLocalCartBootstrap = () => {
          const localCart = readLocalCart();
          const localItems = readCartItems();
          writeLocalCart(localCart);
          writeCartItems(localItems);
          getOrCreateCartSessionId();
        };

        const rememberCartItem = (productId) => {
          if (!productId) {
            return;
          }
          const product = state.products.find((item) => item.id === productId);
          if (!product) {
            return;
          }
          const payload = readCartItems();
          payload[productId] = {
            id: product.id,
            name: product.name,
            manufacturer: product.manufacturer,
            price: product.price,
            discountPrice: product.discountPrice,
            imageUrl: product.imageUrl || FALLBACK_IMAGE,
          };
          writeCartItems(payload);
        };

        const getPriceForCart = (item) => {
          const price = Number(item?.price);
          const discountPrice = Number(item?.discountPrice);
          if (Number.isFinite(discountPrice) && discountPrice > 0 && Number.isFinite(price) && discountPrice < price) {
            return discountPrice;
          }
          if (Number.isFinite(price) && price > 0) {
            return price;
          }
          return 0;
        };

        const normalizeCartQuantity = (value) => {
          const parsed = Number(value);
          if (!Number.isFinite(parsed) || parsed <= 0) {
            return 0;
          }
          return Math.floor(parsed);
        };

        const applyCartSnapshot = (snapshot) => {
          if (!snapshot || typeof snapshot !== "object") {
            return false;
          }

          const sessionId =
            normalizeText(snapshot.cart_session_id) ||
            normalizeText(snapshot.cartSessionId) ||
            normalizeText(snapshot.session_id) ||
            normalizeText(snapshot.sessionId);
          if (sessionId) {
            localStorage.setItem(CART_SESSION_KEY, sessionId);
          }

          const sourceItems = Array.isArray(snapshot.items) ? snapshot.items : [];
          if (!sourceItems.length) {
            renderCartBadge();
            if (cartModal && !cartModal.hidden) {
              renderCartModal();
            }
            return Boolean(sessionId);
          }

          const nextCart = {};
          const previousItems = readCartItems();
          const nextItems = {};

          sourceItems.forEach((rawItem) => {
            if (!rawItem || typeof rawItem !== "object") {
              return;
            }
            const productId =
              normalizeText(rawItem.product_id) ||
              normalizeText(rawItem.productId) ||
              normalizeText(rawItem.id) ||
              normalizeText(rawItem.sku);
            if (!productId) {
              return;
            }
            const qty = normalizeCartQuantity(rawItem.quantity ?? rawItem.count ?? 1);
            if (qty <= 0) {
              return;
            }
            nextCart[productId] = qty;

            const previous = previousItems[productId];
            nextItems[productId] = {
              id: productId,
              name: normalizeText(rawItem.name) || normalizeText(rawItem.name_ru) || normalizeText(previous?.name) || "Товар",
              manufacturer:
                normalizeText(rawItem.manufacturer) || normalizeText(previous?.manufacturer) || "Производитель не указан",
              price: Number(rawItem.price ?? previous?.price) || null,
              discountPrice: Number(rawItem.discountPrice ?? rawItem.discount_price ?? previous?.discountPrice) || null,
              imageUrl: resolveImageUrl(rawItem.image_url || rawItem.imageUrl || rawItem.image || previous?.imageUrl) || FALLBACK_IMAGE,
            };
          });

          writeLocalCart(nextCart);
          writeCartItems(nextItems);
          renderCartBadge();
          if (cartModal && !cartModal.hidden) {
            renderCartModal();
          }
          return true;
        };

        const syncLocalCartFromToolPayload = (payload) => {
          if (!payload || typeof payload !== "object") {
            return false;
          }

          const candidates = [
            payload,
            payload.structuredContent,
            payload.result,
            payload.result?.structuredContent,
            payload.data,
            payload.payload,
          ];

          for (const candidate of candidates) {
            if (!candidate || typeof candidate !== "object") {
              continue;
            }
            if (
              normalizeText(candidate.cart_session_id) ||
              normalizeText(candidate.cartSessionId) ||
              Array.isArray(candidate.items) ||
              Array.isArray(candidate.cart?.items)
            ) {
              const merged = {
                ...candidate,
                cart_session_id:
                  candidate.cart_session_id || candidate.cartSessionId || candidate.cart?.cart_session_id || candidate.cart?.cartSessionId,
                items: Array.isArray(candidate.items)
                  ? candidate.items
                  : Array.isArray(candidate.cart?.items)
                    ? candidate.cart?.items
                    : [],
              };
              if (applyCartSnapshot(merged)) {
                return true;
              }
            }
          }
          return false;
        };

        const renderCartModal = () => {
          if (!cartModalItems || !cartModalTotal) {
            return;
          }
          const cart = readLocalCart();
          const cartItems = readCartItems();
          const rows = Object.entries(cart)
            .map(([productId, qty]) => {
              const quantity = Number(qty);
              if (!Number.isFinite(quantity) || quantity <= 0) {
                return null;
              }
              const fromProductsState = state.products.find((entry) => entry.id === productId);
              const item = (cartItems[productId] && typeof cartItems[productId] === "object" ? cartItems[productId] : fromProductsState) || {};
              const unitPrice = getPriceForCart(item);
              const lineTotal = unitPrice * quantity;
              const imageUrl = normalizeText(item.imageUrl) || FALLBACK_IMAGE;
              return {
                productId,
                quantity,
                unitPrice,
                lineTotal,
                name: normalizeText(item.name) || `Товар #${productId}`,
                manufacturer: normalizeText(item.manufacturer) || "Производитель не указан",
                imageUrl,
              };
            })
            .filter(Boolean);

          if (!rows.length) {
            cartModalItems.innerHTML = '<p class="cart-modal-empty">В корзине пока нет товаров</p>';
            cartModalTotal.textContent = "Итого: 0.00 MDL";
            return;
          }

          cartModalItems.innerHTML = rows
            .map(
              (row) => `
                <article class="cart-modal-item" data-product-id="${row.productId}">
                  <img
                    class="cart-modal-item-image"
                    src="${row.imageUrl}"
                    alt="${row.name}"
                    loading="lazy"
                    onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}'"
                  />
                  <div>
                    <p class="cart-modal-item-name">${row.name}</p>
                    <p class="cart-modal-item-meta">${row.manufacturer}</p>
                    <p class="cart-modal-item-price">${toMoney(row.lineTotal)}</p>
                  </div>
                  <div class="cart-modal-qty">
                    <button class="cart-modal-qty-button" data-action="cart-decrease">−</button>
                    <span class="cart-modal-qty-value">${row.quantity}</span>
                    <button class="cart-modal-qty-button" data-action="cart-increase">+</button>
                  </div>
                </article>
              `,
            )
            .join("");

          const total = rows.reduce((sum, row) => sum + row.lineTotal, 0);
          cartModalTotal.textContent = `Итого: ${toMoney(total)}`;
        };

        const toggleCartModal = (nextState) => {
          if (!cartModal) {
            return;
          }
          const shouldOpen = typeof nextState === "boolean" ? nextState : cartModal.hidden;
          cartModal.hidden = !shouldOpen;
          if (shouldOpen) {
            renderCartModal();
          }
        };

        const renderCartBadge = () => {
          const count = readLocalCartCount();
          if (!cartBadge) {
            return;
          }
          if (count <= 0) {
            cartBadge.hidden = true;
            cartBadge.textContent = "0";
            return;
          }
          cartBadge.hidden = false;
          cartBadge.textContent = String(count);
        };

        const updateCarouselControls = () => {
          if (!track || !leftArrow || !rightArrow) {
            return;
          }
          const canScroll = track.scrollWidth > track.clientWidth + 2;
          const maxScroll = Math.max(0, track.scrollWidth - track.clientWidth);
          leftArrow.disabled = !canScroll || track.scrollLeft <= 2;
          rightArrow.disabled = !canScroll || track.scrollLeft >= maxScroll - 2;
        };

        const renderProducts = () => {
          if (!track) {
            return;
          }

          if (state.isLoading || !state.loadedOnce) {
            track.innerHTML = `
              <article class="skeleton-card" aria-hidden="true">
                <div class="skeleton-block skeleton-image"></div>
                <div class="skeleton-block skeleton-title"></div>
                <div class="skeleton-block skeleton-title"></div>
                <div class="skeleton-block skeleton-meta"></div>
                <div class="skeleton-block skeleton-price"></div>
                <div class="skeleton-block skeleton-button"></div>
              </article>
              <article class="skeleton-card" aria-hidden="true">
                <div class="skeleton-block skeleton-image"></div>
                <div class="skeleton-block skeleton-title"></div>
                <div class="skeleton-block skeleton-title"></div>
                <div class="skeleton-block skeleton-meta"></div>
                <div class="skeleton-block skeleton-price"></div>
                <div class="skeleton-block skeleton-button"></div>
              </article>
              <article class="skeleton-card" aria-hidden="true">
                <div class="skeleton-block skeleton-image"></div>
                <div class="skeleton-block skeleton-title"></div>
                <div class="skeleton-block skeleton-title"></div>
                <div class="skeleton-block skeleton-meta"></div>
                <div class="skeleton-block skeleton-price"></div>
                <div class="skeleton-block skeleton-button"></div>
              </article>
            `;
            updateCarouselControls();
            return;
          }

          if (!state.products.length) {
            track.innerHTML =
              '<article class="product-card"><h3 class="product-title">Ничего не найдено</h3><p class="manufacturer">Попробуйте другой запрос</p></article>';
            updateCarouselControls();
            return;
          }

          track.innerHTML = state.products
            .map((product) => {
              const hasBasePrice = typeof product.price === "number" && product.price > 0;
              const hasDiscountPrice = typeof product.discountPrice === "number" && product.discountPrice > 0;
              const hasDiscount = hasBasePrice && hasDiscountPrice && product.discountPrice < product.price;
              const effectivePrice = hasDiscount ? product.discountPrice : hasBasePrice ? product.price : null;
              const discount = hasDiscount ? computeDiscount(product.price, product.discountPrice) : null;
              const discountBadge = discount ? `<span class="discount">-${discount}%</span>` : "";
              const oldPriceLine = hasDiscount ? `<p class="old-price">${toMoney(product.price)} ${discountBadge}</p>` : "";
              const inStock = typeof effectivePrice === "number";
              const priceLine = inStock
                ? `<p class="new-price">${toMoney(effectivePrice)}</p>`
                : '<p class="new-price is-unavailable">Нет в наличии</p>';
              const actionButton = inStock
                ? `<button class="add-to-cart-button" data-action="add-to-cart" data-product-id="${product.id}">В корзину</button>`
                : '<button class="add-to-cart-button add-to-cart-button--ghost" disabled>Уточнить наличие</button>';

              return `
                <article class="product-card ${inStock ? "" : "is-unavailable"}" data-product-id="${product.id}">
                  <img
                    class="product-image"
                    src="${product.imageUrl}"
                    alt="${product.name}"
                    loading="lazy"
                    onerror="this.onerror=null;this.src='${FALLBACK_IMAGE}'"
                  />
                  <h3 class="product-title">${product.name}</h3>
                  <div class="product-manufacturer-row">
                    <p class="manufacturer">${product.manufacturer}</p>
                  </div>
                  <div class="product-price-row">${oldPriceLine}</div>
                  ${priceLine}
                  ${actionButton}
                </article>
              `;
            })
            .join("");

          updateCarouselControls();
        };

        const extractInitialToolPayload = () => {
          const candidates = [
            window.__APTEKA_WIDGET_PAYLOAD__,
            window.__MCP_STRUCTURED_CONTENT__,
            window.__MCP_TOOL_RESULT__,
            window.__OPENAI_TOOL_RESULT__,
            window.__INITIAL_TOOL_RESULT__,
            window.openai?.structuredContent,
            window.openai?.toolResult?.structuredContent,
            window.openai?.toolResult,
            window.openai?.toolOutput?.structuredContent,
            window.openai?.toolOutput,
            window.openai?.lastToolResult?.structuredContent,
            window.openai?.lastToolResult,
          ];
          for (const candidate of candidates) {
            if (!candidate || typeof candidate !== "object") {
              continue;
            }
            syncLocalCartFromToolPayload(candidate);
            if (Array.isArray(candidate.products) || Array.isArray(candidate.items) || Array.isArray(candidate.results)) {
              return candidate;
            }
            if (
              candidate.structuredContent &&
              typeof candidate.structuredContent === "object" &&
              (Array.isArray(candidate.structuredContent.products) ||
                Array.isArray(candidate.structuredContent.items) ||
                Array.isArray(candidate.structuredContent.results))
            ) {
              syncLocalCartFromToolPayload(candidate.structuredContent);
              return candidate.structuredContent;
            }
          }
          return null;
        };

        const extractPayloadFromMessage = (rawMessage) => {
          if (!rawMessage || typeof rawMessage !== "object") {
            return null;
          }
          const candidates = [
            rawMessage,
            rawMessage.payload,
            rawMessage.data,
            rawMessage.result,
            rawMessage.result?.structuredContent,
            rawMessage.structuredContent,
          ];
          for (const candidate of candidates) {
            if (!candidate || typeof candidate !== "object") {
              continue;
            }
            syncLocalCartFromToolPayload(candidate);
            if (Array.isArray(candidate.products) || Array.isArray(candidate.items) || Array.isArray(candidate.results)) {
              return candidate;
            }
            if (
              candidate.structuredContent &&
              typeof candidate.structuredContent === "object" &&
              (Array.isArray(candidate.structuredContent.products) ||
                Array.isArray(candidate.structuredContent.items) ||
                Array.isArray(candidate.structuredContent.results))
            ) {
              syncLocalCartFromToolPayload(candidate.structuredContent);
              return candidate.structuredContent;
            }
          }
          return null;
        };

        const applyInitialToolPayload = (payload) => {
          if (!payload || typeof payload !== "object") {
            return false;
          }
          const mapped = extractItems(payload).map(mapProduct).filter((product) => product.id);
          if (!mapped.length) {
            return false;
          }
          const query = normalizeText(payload.query);
          if (query && input) {
            input.value = query;
          }
          state.products = mapped;
          state.lastQuery = query;
          state.loadedOnce = true;
          return true;
        };

        const tryHydrateInitialPayload = () => {
          const payload = extractInitialToolPayload();
          if (!payload) {
            return false;
          }
          if (!applyInitialToolPayload(payload)) {
            return false;
          }
          setLoading(false);
          renderProducts();
          return true;
        };

        const waitForInitialPayload = () =>
          new Promise((resolve) => {
            if (tryHydrateInitialPayload()) {
              resolve(true);
              return;
            }

            const onMessage = (event) => {
              const messagePayload = extractPayloadFromMessage(event?.data);
              if (!messagePayload) {
                return;
              }
              if (!applyInitialToolPayload(messagePayload)) {
                return;
              }
              window.clearInterval(intervalId);
              window.clearTimeout(timeoutId);
              window.removeEventListener("message", onMessage);
              setLoading(false);
              renderProducts();
              resolve(true);
            };

            window.addEventListener("message", onMessage, { passive: true });

            const intervalId = window.setInterval(() => {
              if (!tryHydrateInitialPayload()) {
                return;
              }
              window.clearInterval(intervalId);
              window.clearTimeout(timeoutId);
              window.removeEventListener("message", onMessage);
              resolve(true);
            }, INITIAL_PAYLOAD_POLL_MS);

            const timeoutId = window.setTimeout(() => {
              window.clearInterval(intervalId);
              window.removeEventListener("message", onMessage);
              resolve(false);
            }, INITIAL_PAYLOAD_WAIT_MS);
          });

        const searchProducts = async (query) => {
          const normalized = normalizeText(query);
          if (!normalized) {
            return;
          }
          if (state.isSearching) {
            return;
          }

          state.isSearching = true;
          state.lastQuery = normalized;
          setLoading(true);

          try {
            let payload = null;
            for (let attempt = 1; attempt <= MAX_SEARCH_ATTEMPTS; attempt += 1) {
              const controller = new AbortController();
              const timeoutId = window.setTimeout(() => controller.abort(), SEARCH_TIMEOUT_MS);
              try {
                const response = await fetch(SEARCH_ENDPOINT, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ query: normalized }),
                  signal: controller.signal,
                });
                payload = await response.json();
                break;
              } catch (_error) {
                if (attempt >= MAX_SEARCH_ATTEMPTS) {
                  throw _error;
                }
              } finally {
                window.clearTimeout(timeoutId);
              }
            }
            state.products = extractItems(payload).map(mapProduct).filter((product) => product.id);
          } catch (_error) {
            state.products = [];
          } finally {
            state.isSearching = false;
            state.loadedOnce = true;
            setLoading(false);
            renderProducts();
          }
        };

        const addToCart = (productId) => {
          writeLocalCartAdd(productId);
          rememberCartItem(productId);
          renderCartBadge();
          if (cartModal && !cartModal.hidden) {
            renderCartModal();
          }
          cartSyncQueue = cartSyncQueue
            .then(() => syncCartAddToBackend(productId))
            .catch((error) => {
              console.error("products cart sync failed", error);
              return null;
            });
        };

        const scrollTrack = (direction) => {
          if (!track) {
            return;
          }
          const firstCard = track.querySelector(".product-card");
          const step = firstCard instanceof HTMLElement ? firstCard.offsetWidth + 14 : 280;
          track.scrollBy({ left: direction * step, behavior: "smooth" });
          window.setTimeout(updateCarouselControls, 280);
        };

        if (leftArrow) {
          leftArrow.addEventListener("click", () => scrollTrack(-1));
        }
        if (rightArrow) {
          rightArrow.addEventListener("click", () => scrollTrack(1));
        }
        if (track) {
          track.addEventListener("scroll", updateCarouselControls);
          track.addEventListener("click", (event) => {
            const target = event.target;
            const actionButton =
              target instanceof Element ? target.closest('[data-action="add-to-cart"]') : target?.parentElement?.closest('[data-action="add-to-cart"]');
            if (actionButton instanceof HTMLElement) {
              addToCart(normalizeText(actionButton.dataset.productId));
            }
          });
        }

        if (searchButton) {
          searchButton.addEventListener("click", (event) => {
            event.preventDefault();
            searchProducts(input ? input.value : "");
          });
        }

        if (input) {
          input.addEventListener("focus", () => {
            if (!state.loadedOnce) {
              searchProducts(input.value);
            }
          });
          input.addEventListener("click", () => {
            if (!state.loadedOnce) {
              searchProducts(input.value);
            }
          });
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              searchProducts(input.value);
            }
          });
        }

        if (cartButton) {
          cartButton.addEventListener("click", () => {
            toggleCartModal(true);
          });
        }

        if (cartModalClose) {
          cartModalClose.addEventListener("click", () => {
            toggleCartModal(false);
          });
        }

        if (cartModal) {
          cartModal.addEventListener("click", (event) => {
            if (event.target === cartModal) {
              toggleCartModal(false);
            }
          });
        }

        if (cartModalItems) {
          cartModalItems.addEventListener("click", (event) => {
            const target = event.target;
            const actionElement =
              target instanceof Element ? target.closest("[data-action]") : target?.parentElement?.closest("[data-action]");
            if (!(actionElement instanceof HTMLElement)) {
              return;
            }
            const action = normalizeText(actionElement.dataset.action);
            if (!action) {
              return;
            }
            const row = actionElement.closest("[data-product-id]");
            if (!(row instanceof HTMLElement)) {
              return;
            }
            const productId = normalizeText(row.dataset.productId);
            if (!productId) {
              return;
            }
            const payload = readLocalCart();
            const currentQty = Number(payload[productId]) || 0;
            if (action === "cart-increase") {
              payload[productId] = currentQty + 1;
            } else if (action === "cart-decrease") {
              const nextQty = currentQty - 1;
              if (nextQty > 0) {
                payload[productId] = nextQty;
              } else {
                delete payload[productId];
              }
            } else {
              return;
            }
            writeLocalCart(payload);
            renderCartBadge();
            renderCartModal();
          });
        }

        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && cartModal && !cartModal.hidden) {
            toggleCartModal(false);
          }
        });

        ensureLocalCartBootstrap();
        renderCartBadge();
        setLoading(true);
        renderProducts();

        waitForInitialPayload().then((didHydrateFromToolPayload) => {
          if (!didHydrateFromToolPayload) {
            state.loadedOnce = true;
            setLoading(false);
            renderProducts();
          }
          updateCarouselControls();
        });

        const activeWidgetId = String(root.getAttribute("data-widget-shell") || "").trim();
        if (!activeWidgetId || typeof window.BroadcastChannel !== "function") {
          return;
        }

        const channel = new window.BroadcastChannel("apteka-widget-shell");
        let active = true;
        channel.onmessage = (event) => {
          const nextWidgetId = String(event?.data?.widgetId || "").trim();
          if (!nextWidgetId || nextWidgetId === activeWidgetId || !active) {
            return;
          }
          active = false;
          root.style.display = "none";
          root.setAttribute("aria-hidden", "true");
        };
        channel.postMessage({ widgetId: activeWidgetId, openedAt: Date.now() });
      })();
    </script>
  </body>
</html>
