<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Mock Widget</title>
    <link rel="stylesheet" href="./styles/widget-shell.css" />
  </head>
  <body>
    <main class="widget-shell" data-widget-shell="set_widget_theme">
      <header class="widget-header">
        <span class="widget-label">set_widget_theme</span>
        <h1 class="widget-title">Theme Selection Layout</h1>
        <p class="widget-subtitle">Static mockup. Theme controls are placeholders only.</p>
      </header>
      <section class="widget-grid">
        <article class="widget-card">
          <h2>Theme Preview Placeholder</h2>
          <p>Color and contrast cards will be interactive later.</p>
        </article>
        <article class="widget-card">
          <h2>Selection Placeholder</h2>
          <p>Current mode and action buttons are disabled intentionally.</p>
        </article>
      </section>
    </main>
    <script src="./scripts/widget-shell.js"></script>
  </body>
</html>
