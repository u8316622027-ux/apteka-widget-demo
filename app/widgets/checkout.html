<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Mock Widget</title>
    <link rel="stylesheet" href="./styles/tailwind.css" />
    <link rel="stylesheet" href="./styles/widget-shell.css" />
      <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body x-data="{ tool: document.title }">
    <main class="widget-shell" data-widget-shell="checkout_order">
      <header class="widget-header">
        <span class="widget-label">checkout_order</span>
        <h1 class="widget-title">Checkout Flow Layout</h1>
        <p class="widget-subtitle">Static mockup. Form controls will be activated in the next stage.</p>
      </header>
      <section class="widget-grid">
        <article class="widget-card">
          <h2>Delivery Step Placeholder</h2>
          <p>Section for pickup or courier delivery branch.</p>
        </article>
        <article class="widget-card">
          <h2>Confirmation Placeholder</h2>
          <p>Review and payment blocks are mocked only.</p>
        </article>
      </section>
    </main>
    <script src="./scripts/widget-shell.js"></script>
  </body>
</html>
