<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart Mock Widget</title>
    <link rel="stylesheet" href="./styles/widget-shell.css" />
  </head>
  <body>
    <main class="widget-shell" data-widget-shell="my_cart">
      <header class="widget-header">
        <span class="widget-label">my_cart</span>
        <h1 class="widget-title">Cart Snapshot Layout</h1>
        <p class="widget-subtitle">Static mockup. Cart interaction is disabled at this stage.</p>
      </header>
      <section class="widget-grid">
        <article class="widget-card">
          <h2>Items Placeholder</h2>
          <p>List of products and quantities placeholder.</p>
        </article>
        <article class="widget-card">
          <h2>Total Placeholder</h2>
          <p>Future totals and pricing details block.</p>
        </article>
      </section>
    </main>
    <script src="./scripts/widget-shell.js"></script>
  </body>
</html>
