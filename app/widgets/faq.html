<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ Mock Widget</title>
    <link rel="stylesheet" href="./styles/widget-shell.css" />
  </head>
  <body>
    <main class="widget-shell" data-widget-shell="support_knowledge_search">
      <header class="widget-header">
        <span class="widget-label">support_knowledge_search</span>
        <h1 class="widget-title">FAQ Search Layout</h1>
        <p class="widget-subtitle">Static mockup. Semantic search UI is non-interactive for now.</p>

      <section class="widget-grid">
        <article class="widget-card">
          <h2>Question Input Placeholder</h2>
          <p>Future free-text search field for FAQ.</p>
        </article>
        <article class="widget-card">
          <h2>Answer Results Placeholder</h2>
          <p>Knowledge chunks and relevance score list mock.</p>
        </article>
      </section>
    </main>
    <script src="./scripts/widget-shell.js"></script>
  </body>
